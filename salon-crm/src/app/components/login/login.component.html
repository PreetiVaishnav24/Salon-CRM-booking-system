<div class="login-page">
  <div class="login-left">
    <div class="brand">
      <div class="brand-icon">✦</div>
      <h1>Lumière</h1>
      <p class="brand-sub">Salon & Wellness Studio</p>
    </div>
    <div class="tagline">
      <h2>Elevate every<br>client experience.</h2>
      <p>Manage appointments, staff, and billing — all in one place.</p>
    </div>
    <div class="features">
      <div class="feature" *ngFor="let f of features">
        <span class="feature-dot"></span>
        <span>{{f}}</span>
      </div>
    </div>
  </div>

  <div class="login-right">
    <div class="login-card">
      <div class="login-header">
        <h2>Welcome back</h2>
        <p>Sign in to your CRM dashboard</p>
      </div>

      <form (ngSubmit)="login()" #loginForm="ngForm">
        <div class="form-group">
          <label for="username">User ID</label>
          <div class="input-wrap">
            <span class="material-icons">person_outline</span>
            <input id="username" type="text" [(ngModel)]="username" name="username"
              placeholder="Enter your user ID" autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="material-icons">lock_outline</span>
            <input id="password" type="password" [(ngModel)]="password" name="password"
              placeholder="Enter your password" autocomplete="current-password">
          </div>
        </div>

        <div class="error-msg" *ngIf="error">
          <span class="material-icons">error_outline</span>{{error}}
        </div>

        <button type="submit" class="btn-login" [class.loading]="loading" [disabled]="loading">
          <span *ngIf="!loading">Sign In</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </form>

      <div class="demo-hint">
        <p>Demo credentials:</p>
        <code>admin / admin123</code> &nbsp;or&nbsp; <code>staff / staff123</code>
      </div>
    </div>
  </div>
</div>
