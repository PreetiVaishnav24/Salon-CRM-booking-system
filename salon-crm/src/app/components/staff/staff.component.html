<div class="staff-page">
  <div class="page-header">
    <div>
      <h2>Staff</h2>
      <p>{{staff.length}} team members</p>
    </div>
    <button class="btn btn-rose">
      <span class="material-icons">person_add</span> Add Staff
    </button>
  </div>

  <div class="staff-grid">
    <div *ngFor="let s of staff" class="staff-card card">
      <div class="staff-top">
        <div class="staff-avatar-lg" [style.background]="s.color">{{s.avatar}}</div>
        <div class="staff-info">
          <h3>{{s.name}}</h3>
          <p class="role">{{s.role}}</p>
          <p class="contact">
            <span class="material-icons">phone</span> {{s.phone}}
          </p>
          <p class="contact">
            <span class="material-icons">email</span> {{s.email}}
          </p>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat">
          <div class="stat-num">{{getTodayCount(s.id)}}</div>
          <div class="stat-label">Today</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <div class="stat-num">{{getAppointmentCount(s.id)}}</div>
          <div class="stat-label">Total</div>
        </div>
      </div>

      <div class="specialties">
        <div class="spec-label">Specialties</div>
        <div class="spec-tags">
          <span *ngFor="let sp of s.specialties" class="spec-tag" [style.background]="s.color + '22'" [style.color]="s.color">
            {{sp}}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
